<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Hub - Zayed University</title>
    <style>
        /* General Styles */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffffff;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-top: 40px;
            margin-bottom: 20px;
        }

        .logo {
            max-width: 250px; /* Made larger */
            margin-bottom: 15px;
        }

        h1 {
            color: #1a1a1a;
            font-size: 24px;
            margin: 0 0 10px 0;
        }

        p.subtitle {
            color: #666;
            font-size: 14px;
            max-width: 400px;
            line-height: 1.5;
            margin: 0 auto 30px auto;
        }

        /* Container for views */
        .container {
            width: 90%;
            max-width: 500px;
            background: #f9f9f9;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid #eee;
        }

        /* Form Elements */
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            font-size: 14px;
        }

        select, input[type="password"], input[type="text"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #b84e60; /* Adjusted focus color to maroon */
            box-shadow: 0 0 5px rgba(184, 78, 96, 0.2);
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #b84e60; /* Changed button color to maroon */
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #984447; /* Darker maroon for hover */
        }

        .error-message {
            color: red;
            font-size: 13px;
            margin-top: -10px;
            margin-bottom: 15px;
            display: none;
            text-align: center;
        }

        /* Main View Styles */
        #main-view {
            display: none; /* Hidden by default until login */
        }

        ul#places-list {
            list-style-type: none;
            padding: 0;
            margin: 0;
            max-height: 250px;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 6px;
            background: white;
        }

        ul#places-list li {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        ul#places-list li:last-child {
            border-bottom: none;
        }

        ul#places-list li:hover {
            background-color: #fcf0f1; /* Light maroon background on hover */
            color: #b84e60; /* Maroon text on hover */
        }

        #location-result {
            margin-top: 25px;
            padding: 25px; /* Increased padding */
            background-color: #fcf0f1; /* Changed background color for results to light maroon */
            border-left: 5px solid #b84e60; /* Changed border color to light maroon */
            border-radius: 4px;
            display: none;
            text-align: center; /* Centered content */
        }

        #location-result h3 {
            margin: 0 0 10px 0;
            color: #b84e60; /* Changed title color to light maroon */
            font-size: 32px; /* Made title larger */
        }

        #location-result p {
            margin: 0;
            font-size: 24px; /* Made location text larger */
            color: #333;
        }

    </style>
</head>

        <h1>Welcome to The Hub</h1>
        <p class="subtitle">Navigate Your Way Through Campus<br>Your journey starts here—a guide provided by The Hub</p>
    </header>

    <div class="container">
        <div id="login-view">
            <label for="username">Username</label>
            <select id="username">
                <option value="Sulaiman">Sulaiman</option>
                <option value="Dhabia">Dhabia</option>
                <option value="Mahra">Mahra</option>
                <option value="Nouf">Nouf</option>
                <option value="Salama">Salama</option>
                <option value="Afra">Afra</option>
            </select>

            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter your password">
            
            <div id="error-msg" class="error-message">Incorrect password.</div> <button onclick="login()">Log In</button>
        </div>

        <div id="main-view">
            <h2 style="margin-top: 0;">Find a Location</h2>
            <input type="text" id="search-bar" placeholder="Search for a department or center..." oninput="filterLocations()">
            
            <ul id="places-list">
                </ul>

            <div id="location-result">
                <h3 id="result-name">Department Name</h3>
                <p id="result-location">Location details will appear here.</p>
            </div>
        </div>
    </div>

    <script>
        // Data containing all departments and their locations
        const departments = [
            { name: "The Hub", location: "MF3, GF (Male Promenade) / FF3, GF (Female Promenade)" },
            { name: "Students Accessibility Services (SAS)", location: "LIBRARY, First Floor" },
            { name: "Students Counseling Center (SCC)", location: "ADMIN, First Floor" },
            { name: "Students Leadership", location: "MF3, GF" },
            { name: "Students Careers and Alumni Office", location: "MF3, GF" },
            { name: "Career Advocate Leaders (CALS)", location: "MF3, GF (Male Promenade)" },
            { name: "Peer Assistance Leaders (PALs)", location: "LIBRARY, First Floor" },
            { name: "Students Life", location: "MF3, 1st / 2nd Floor" },
            { name: "Wellness Center", location: "MF3, GF" },
            { name: "Sports Center", location: "FSP : Sports and Recreation Centre" },
            { name: "Financial Aid", location: "MF3, GF (0.052)" },
            { name: "Registration", location: "ADMIN, First Floor (Male side)" },
            { name: "Center of Students Success", location: "FF3, GF" },
            { name: "IT", location: "ADMIN, GF" },
            { name: "Library", location: "1st, 2nd, 3rd Floors" },
            { name: "Business Center", location: "GF, Library" }
        ];

        // --- Login Logic ---
        function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');

            // The required password format is Name***
            const correctPassword = username + "***";

            if (password === correctPassword) {
                // Hide login, show main app
                document.getElementById('login-view').style.display = 'none';
                document.getElementById('main-view').style.display = 'block';
                // Initialize the list
                renderList(departments);
            } else {
                // Show error
                errorMsg.style.display = 'block';
            }
        }

        // --- Search & Display Logic ---
        const listElement = document.getElementById('places-list');
        const searchInput = document.getElementById('search-bar');
        const resultDiv = document.getElementById('location-result');
        const resultName = document.getElementById('result-name');
        const resultLocation = document.getElementById('result-location');

        function renderList(items) {
            listElement.innerHTML = ''; // Clear current list
            
            items.forEach(dept => {
                const li = document.createElement('li');
                li.textContent = dept.name;
                // Add click event to show location
                li.onclick = () => showLocation(dept);
                listElement.appendChild(li);
            });
        }

        function filterLocations() {
            const query = searchInput.value.toLowerCase();
            const filtered = departments.filter(dept => 
                dept.name.toLowerCase().includes(query)
            );
            renderList(filtered);
            
            // Hide the result box when typing a new search to keep it clean
            resultDiv.style.display = 'none';
        }

        function showLocation(department) {
            resultName.textContent = department.name;
            
            // Make the text more readable like your example
            let formattedLocation = department.location;
            if(formattedLocation === "ADMIN, GF") formattedLocation = "Administration Building, Ground Floor (GF)";
            if(formattedLocation === "ADMIN, First Floor") formattedLocation = "Administration Building, First Floor";
            if(formattedLocation === "LIBRARY, First Floor") formattedLocation = "Library Building, First Floor";
            
            resultLocation.textContent = "Location: " + formattedLocation;
            resultDiv.style.display = 'block';
        }
    </script>

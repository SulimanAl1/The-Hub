<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Hub - Zayed University</title>
    <style>
        /* General Styles */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffffff;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-top: 40px;
            margin-bottom: 20px;
        }

        .logo {
            /* تعديل حجم الصورة من هنا - تم رفعه إلى 1000 */
            width: 800px; 
            height: auto;
            max-width: 95vw; 
            margin-bottom: 15px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        h1 {
            color: #1a1a1a;
            font-size: 24px;
            margin: 0 0 10px 0;
        }

        p.subtitle {
            color: #666;
            font-size: 14px;
            max-width: 400px;
            line-height: 1.5;
            margin: 0 auto 30px auto;
        }

        /* Container for views */
        .container {
            width: 90%;
            max-width: 500px;
            background: #f9f9f9;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid #eee;
        }

        /* Form Elements */
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            font-size: 14px;
        }

        select, input[type="password"], input[type="text"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #b84e60; 
            box-shadow: 0 0 5px rgba(184, 78, 96, 0.2);
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #b84e60; 
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #984447; 
        }

        .error-message {
            color: red;
            font-size: 13px;
            margin-top: -10px;
            margin-bottom: 15px;
            display: none;
            text-align: center;
        }

        /* Main View Styles */
        #main-view {
            display: none; 
        }

        #welcome-message {
            margin-top: 0;
            text-align: center;
            color: #b84e60;
            font-size: 22px;
            line-height: 1.4;
            font-weight: bold;
        }

        ul#places-list {
            list-style-type: none;
            padding: 0;
            margin: 0;
            max-height: 250px;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 6px;
            background: white;
        }

        ul#places-list li {
            padding: 12px 15px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        ul#places-list li:last-child {
            border-bottom: none;
        }

        ul#places-list li:hover {
            background-color: #fcf0f1; 
            color: #b84e60; 
        }

        #location-result {
            margin-top: 25px;
            padding: 25px; 
            background-color: #fcf0f1; 
            border-left: 5px solid #b84e60; 
            border-radius: 4px;
            display: none;
            text-align: center; 
        }

        #location-result h3 {
            margin: 0 0 10px 0;
            color: #b84e60; 
            font-size: 32px; 
        }

        #location-result p {
            margin: 0;
            font-size: 24px; 
            color: #333;
        }

    </style>
</head>
<body>

    <header>
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTGb8nhZ_teZfo9uiZh5pA5vjoSRo9h5EKvBQ&s" alt="The Hub Logo" class="logo">
        
        <div id="intro-text">
            <h1>Welcome to The Hub</h1>
            <p class="subtitle">Navigate Your Way Through Campus<br>Your journey starts here—a guide provided by The Hub</p>
        </div>
    </header>

    <div class="container">
        <div id="login-view">
            <label for="User">User</label>
            <select id="User">
                <option value="" disabled selected hidden>Who's this?</option>
                <option value="Afra">Afra</option>
                <option value="Dhabia">Dhabia</option>
                <option value="Fatima">Fatima</option>
                <option value="Mahra">Mahra</option>
                <option value="Ms. Aliya">Ms. Aliya</option>
                <option value="Nouf">Nouf</option>
                <option value="Salama">Salama</option>
                <option value="Sulaiman">Sulaiman</option>
            </select>

            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter your password">
            
            <div id="error-msg" class="error-message">Incorrect password.</div>

            <button onclick="login()">Log In</button>
        </div>

        <div id="main-view">
            <h2 id="welcome-message"></h2>
            <input type="text" id="search-bar" placeholder="Search for a department or center..." oninput="filterLocations()">
            
            <ul id="places-list"></ul>

            <div id="location-result">
                <h3 id="result-name">Department Name</h3>
                <p id="result-location">Location details will appear here.</p>
            </div>
        </div>
    </div>

    <script>
        const departments = [
            { name: "The Hub", location: "MF3, GF (Male Promenade) / FF3, GF (Female Promenade)" },
            { name: "Students Accessibility Services (SAS)", location: "LIBRARY, First Floor" },
            { name: "Students Counseling Center (SCC)", location: "ADMIN, First Floor" },
            { name: "Students Leadership", location: "MF3, GF" },
            { name: "Students Careers and Alumni Office", location: "MF3, GF" },
            { name: "Career Advocate Leaders (CALS)", location: "MF3, GF (Male Promenade)" },
            { name: "Peer Assistance Leaders (PALs)", location: "LIBRARY, First Floor" },
            { name: "Students Life", location: "MF3, 1st / 2nd Floor" },
            { name: "Wellness Center", location: "MF3, GF" },
            { name: "Sports Center", location: "FSP : Sports and Recreation Centre" },
            { name: "Financial Aid", location: "MF3, GF (0.052)" },
            { name: "Registration", location: "ADMIN, First Floor (Male side)" },
            { name: "Center of Students Success", location: "FF3, GF" },
            { name: "IT", location: "ADMIN, GF" },
            { name: "Library", location: "1st, 2nd, 3rd Floors" },
            { name: "Business Center", location: "GF, Library" }
        ];

        function login() {
            const User = document.getElementById('User').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');

            if (!User) {
                errorMsg.textContent = "Please select a user.";
                errorMsg.style.display = 'block';
                return;
            }

            let correctPassword;
            if (User === "Ms. Aliya") {
                correctPassword = "AliyaZ11111"; 
            } else {
                correctPassword = User + "!!"; 
            }

            if (password === correctPassword) {
                document.getElementById('login-view').style.display = 'none';
                document.getElementById('intro-text').style.display = 'none';
                document.getElementById('main-view').style.display = 'block';
                
                const welcomeMsg = document.getElementById('welcome-message');
                welcomeMsg.innerHTML = "Welcome " + User + "!<br>What place are you looking for?";
                
                renderList(departments);
            } else {
                errorMsg.textContent = "Incorrect password.";
                errorMsg.style.display = 'block';
            }
        }

        const listElement = document.getElementById('places-list');
        const searchInput = document.getElementById('search-bar');
        const resultDiv = document.getElementById('location-result');
        const resultName = document.getElementById('result-name');
        const resultLocation = document.getElementById('result-location');

        function renderList(items) {
            listElement.innerHTML = ''; 
            items.forEach(dept => {
                const li = document.createElement('li');
                li.textContent = dept.name;
                li.onclick = () => showLocation(dept);
                listElement.appendChild(li);
            });
        }

        function filterLocations() {
            const query = searchInput.value.toLowerCase();
            const filtered = departments.filter(dept => 
                dept.name.toLowerCase().includes(query)
            );
            renderList(filtered);
            resultDiv.style.display = 'none';
        }

        function showLocation(department) {
            resultName.textContent = department.name;
            let formattedLocation = department.location;
            if(formattedLocation === "ADMIN, GF") formattedLocation = "Administration Building, Ground Floor (GF)";
            if(formattedLocation === "ADMIN, First Floor") formattedLocation = "Administration Building, First Floor";
            if(formattedLocation === "LIBRARY, First Floor") formattedLocation = "Library Building, First Floor";
            
            resultLocation.textContent = "Location: " + formattedLocation;
            resultDiv.style.display = 'block';
        }
    </script>
</body>
</html>
